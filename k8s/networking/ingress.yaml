apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traffic-simulator-ingress
  namespace: traffic-simulator
spec:
  rules:
    - host: traffic-simulator.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 3000
