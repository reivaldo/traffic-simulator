global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "simulator"
    static_configs:
      - targets: ["simulator:8081"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "ingestor"
    static_configs:
      - targets: ["ingestor:8082"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "processor"
    static_configs:
      - targets: ["processor:8083"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "sender"
    static_configs:
      - targets: ["sender:8084"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "admin-api"
    static_configs:
      - targets: ["admin-api:8086"]
    metrics_path: "/metrics"
    scrape_interval: 5s
